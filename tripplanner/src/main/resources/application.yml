spring:
  application:
    name: tripplanner
  
  # 🐬 MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/trip?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123123}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  
  jpa: 
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
  
server:
  port: 8081

router9:
  api:
    key: ${9ROUTER_API_KEY:}
    url: http://localhost:20128/v1/chat/completions

ai-service:
  url: http://localhost:8000/ai
